<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FinTrack Pro | Personal Finance Tracker</title>

    <meta
      name="description"
      content="FinTrack Pro is a clean personal finance tracker built with HTML, CSS, Vanilla JavaScript, Chart.js, and Local Storage."
    />

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="FinTrack Pro | Personal Finance Tracker"
    />
    <meta
      property="og:description"
      content="Track income, expenses, and weekly cash flow with a clean multi-user dashboard built in HTML, CSS, and Vanilla JavaScript."
    />
    <meta
      property="og:url"
      content="https://t-harsha-vardhan.github.io/fintech-pro/"
    />
    <meta
      property="og:image"
      content="https://t-harsha-vardhan.github.io/fintech-pro/assets/images/fintrack-linkedin.png"
    />
    <meta
      property="og:image:alt"
      content="FinTrack Pro personal finance dashboard preview"
    />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="FinTrack Pro | Personal Finance Tracker"
    />
    <meta
      name="twitter:description"
      content="A clean multi-user personal finance tracker with income, expenses, weekly chart, filters, and Local Storage."
    />
    <meta
      name="twitter:image"
      content="https://t-harsha-vardhan.github.io/fintrack-pro/assets/images/fintrack-x.png"
    />

    <link rel="stylesheet" href="auth.css" />
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h1>FinTrack Pro</h1>
        <p class="subtitle">Welcome back! Login to manage your finances.</p>

        <form class="login-form">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              class="login-email"
              placeholder="Enter your email"
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              class="login-password"
              placeholder="Enter your password"
            />
          </div>

          <button type="submit" class="btn-primary login-btn">Login</button>
        </form>

        <p class="bottom-text">
          Don't have an account?
          <a href="register.html">Register</a>
        </p>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
